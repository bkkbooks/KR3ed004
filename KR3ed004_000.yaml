浸一時蒼朮米汁浸春五夏三秋七冬十日炒乾川羌活去蘆白芨麵裹煨曬乾烏豆以糯米炒黃為度地龍去土各半兩滴青一錢半別研麝香半兩別研川芎半兩熱湯洗三次五靈脂一兩半用燈心別研乳香一兩別研沒藥一兩別研川烏二兩炮骨碎補去毛炒川牛膝酒浸一時細辛去苗花桑木燒灰存性白芷不蛀者赤芍藥酒浸川牽牛石灰炒南星以石灰炒黃色為度自然銅煅酒淬別研大栗間各半兩大鱉二十個去油殼上為細末酒煮麵糊為丸如彈子大入臼杵三十餘下團成塊稱一兩分作三丸候丸盡分作三分一分陰乾一分曬乾半時久一分焙半時久卻三分打和一處令陰陽相合俟藥上塵氣為度然後刷去塵用黑漆光為衣洗藥後有仙正散方如傷重先用洗後卻用烏龍角貼其洗藥同前方內又參山泉方洗藥用木朔翟石南葉白芷白楊皮生蔥何首烏土當歸荊芥藁本芍藥上不拘多少煎湯候溫將洗損處令淨用絹滲干瘡口上為妙烏龍角貼藥治跌撲傷損筋骨碎斷差爻出臼其用法詳見前方黑龍散同先洗擦整理後調貼夾縛亦可用此干糝瘡口白殭蠶六兩去絲嘴炒赤小豆六兩川牛膝六兩去蘆山桂去皮桔梗白芨百草霜山枇杷葉生銼陰乾各一斤當歸尾骨碎補去毛炒北細辛去苗各半斤白芷赤芍藥南星煨何首烏各十兩白蘞十兩知母草烏各三兩用薑汁煮上為細末如藥潤亦可焙乾碾之每用以薑汁或冷水茶水調攤紙上於痛腫處貼之三日一洗一換貼骨碎須夾桃紅散治積年不效朽爛瘡口金瘡箭射打碎皮破血出不止可將此藥干擫次日別用藥水洗淨再擫大能散血結口石膏一斤黃泥封固煅過白礬二兩飛過血竭一兩別研黃丹細研火飛過水飛過松糖別研五倍子粉霜各三兩龍骨二兩別研上研為極細末罐子收用紫金散整骨續筋生肌止痛內傷肝肺嘔血不止或在心腹脹痛四肢無力左右半身風瘓並宜服之紫金藤皮二兩降真二兩續斷五兩要細者骨碎補二兩無名異三兩燒紅醋淬七次琥珀二兩牛膝三兩去苗酒浸一宿當歸二兩去尾桃仁二兩去皮蒲黃一兩大黃一兩煨朴硝半兩熱湯泡化用花葉紙濾過七次上件為末用蘇木煎酒調日進三服即效七寶散治冷水風腳濕氣下注腳膝生瘡左癱右瘓筋脈拘急腳下隱痛不得伸屈不能踏地並皆治之晚蠶砂一升炒蛇床子一升炒肉桂二兩去皮荊芥穗五兩乾荷葉二兩藁本五兩去土川烏二兩炮薏苡仁三兩上件㕮咀約二兩重用水五升加花椒連須蔥同煎至七分去渣於痛處熱斟淋冼定痛丸治腰痛不可忍不問男子婦人室女老幼並皆治之威靈仙半兩去土金鈴子一兩炒去核川烏一兩炮八角茴香一兩上為末酒煮麵糊為丸如梧子大每服五十丸鹽湯酒隨上下服之七氣湯治積年久損入經絡服藥無效腰背拘急咳嗽痰涎風勞發動日漸羸瘦每到秋來損病復作不問男子婦人並皆治之青皮去白炒陳皮去白三稜濕紙裹煨北梗去蘆肉桂去粗皮藿香去枝益智去殼炒香附子炒甘草炙半夏湯泡赤芍藥烏藥獨活羌活去蘆降真香各一兩上㕮咀每服五錢水一大盞半姜三片棗一枚煎至七分去滓隨病上下服之仙正散洗藥治男子婦人骨斷用此煎水洗後整骨卻用烏龍角貼之如破留口當夾縛即依前方為之肉桂二錢去皮當歸三錢去尾胡索五錢白芷五錢蒼朮一兩赤芍藥五錢防風一兩荊芥四兩上㕮咀每服五錢水五升乾荷葉兩皮煎至七分去滓於損處斷處及冷水風腳筋脈拘急不得屈伸行步艱苦用此藥熱蒸用被蓋覆候溫淋洗糝瘡口方但遇傷損皮肉血出或破腦傷風血出不止急用此藥擫之血竭二錢半別研降真香四錢燈心一把龍骨五花者二錢別研雞一隻連毛屎用醋煮後碎之用黃泥封固以文武火煨乾後焙為末蘇木同降真香碾少許乳香五錢同燈心研沒藥五錢別研桔梗少許紅花要馬頭者二錢焙乾為末當歸三錢上為細末每用少許干擫瘡口上如血流湧出不止多擫之候血藥將干又用清油調塗於瘡上可制一料以備急用接骨散治飛禽骨斷從高墜下驢馬跌折筋斷骨碎痛不可忍此乃接骨續筋止痛活血硼砂一錢半水粉當歸各一錢上為末每服二錢煎蘇木湯服訖時時但飲蘇木湯立效除痕欲傷後瘡愈無痕用此蔓荊子隨風子續隨子黃荊子上件各等分為細末飯上蒸九遍用童便浸一宿後炒乾為度以花葉紙包在絹巾內揩之可以除痕陰紅湯專治婦人傷損瘀血不散腹肚膨脹大小便不通上攻心腹悶亂至死者急將此藥通下卻依前次第服藥鹿角膠産婦油發各一錢燒沒藥三錢上用酒一大盞煎服膠艾湯專治婦人尋常經脈不通宜先服此後服鱉甲散乾地黃三錢阿膠一錢川芎艾葉各一錢上㕮咀每服二錢水一大盞酒半盞煎至八分不拘時溫服洗藥治男子婦人骨斷用此煎水洗後整骨了卻用烏龍角貼杜仲五兩五加皮七兩蔥根一把上三味水五升煎至七分去滓淋洗每服二兩半重傷破留口用藥摻骨斷當夾縛詳見前論
