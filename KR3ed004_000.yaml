body:
  text: 醫治整理補接次第口訣一煎水洗二相度損處三拔伸四或用力收入骨五捺正六用黑龍散通七用風流散填瘡八夾縛九服藥十再洗十一再用黑龍散通十二或再用風流散填瘡口十三再夾縛十四仍用前服藥治之凡腦骨傷碎輕輕用手撙令平正若皮不破用黑龍散敷貼若破用風流散填瘡口絹片包之不可見風著水恐成破傷風若水與風入腦成破傷風則必發頭痛不復可治在發內者須剪去發敷之凡腦骨傷碎在頭骨上則可治在太陽穴乃是命處斷然不可治矣凡肩甲骨出相度如何整用椅當圈住脅仍以軟衣被盛簟使一人捉定兩人拔伸卻墜下手腕又著曲著手腕絹片縛之凡金井骨在脅之下有傷損不可夾縛只是捺平令安貼平正用黑龍散貼絹片縛兩脅骨亦如此凡跨骨從臀上出者可用三兩人挺定腿拔伸乃用腳奈入如跨骨從襠內出不可整矣凡手骨出者看如何出若骨出向左則向右邊拔入骨向右出則向左拔入凡手腳骨皆有兩脛若一脛斷則可治兩脛俱斷決不可治矣凡手腳骨傷甚者不可治凡傷損重者大概要拔伸捺正或取開捺正然後敷貼填塗夾縛拔伸當相近本骨損處不可別去一節骨上凡拔伸且要相度左右骨如何出有正拔伸者有斜拔伸者凡認損處只須揣摸骨頭平正不平正便可見凡左右損處只相度骨縫仔細捻捺忖度便見大概要骨頭歸舊要撙捺皮相就入骨凡拔伸或用一人或用二人三人看難易如何凡皮破骨出差爻拔伸不入撙捺相近爭一二分用快刀割些捺入骨不須割肉肉自爛碎了可以入骨骨入之後用黑龍散貼瘡之四圍腫處留瘡口別用風流散填所用刀最要快剜刀雕刀皆可凡捺正要時時轉動使活凡骨碎斷須要本處平正如何大抵骨低是骨不曾損左右看骨方是損處要拔伸捺正用藥貼夾縛要平正方是凡腫是血作用熱藥水泡洗卻用黑龍散敷貼凡傷重必用藥水泡洗然後塗藥如傷輕不必洗便塗藥凡夾縛夏三兩日冬五三日解開夾縛處用熱藥水泡洗去舊藥洗時切不可驚動損處了仍用黑龍散敷夾縛蓋傷重者方如此凡皮破用風流散填更塗未破用黑龍散貼須用杉木皮夾縛之凡拔伸捺正要軟物如絹片之類奠之凡皮里有碎骨只用黑龍散敷貼後來皮肉自爛其碎骨必然自出來然後方愈凡骨破打斷或筋斷有破處用風流散填塗卻用針線縫合其皮又四圍用黑龍散敷貼凡夾縛用杉木皮數片周回緊夾縛留開皆一縫夾縛必三度縛必要緊凡平處骨碎皮不破用藥貼用密夾縛大概看曲轉處腳凹之類不可夾縛恐後伸不得止用黑龍散貼帛片包縛庶可曲轉屈伸有數處如指骨斷止用苧麻夾縛腿上用苧麻繩夾縛繩如錢繩許大凡貼藥用板子一片將皮紙或油紙以水調黑龍散攤勻在上然後卷之貼損處凡用杉皮浸約如指大片疏排令周匝用小繩三度緊縛三日一次如前淋洗換塗貼藥凡曲縛如手腕腳凹手指之類要轉動用藥貼將絹片包之後時時運動蓋曲則得伸得伸則不得屈或屈或伸時時為之方可凡損傷其初痹而不痛應拔伸捺正復用刀取開皮皆不痛三二日後方痛凡損一月尚可整理久則不可凡損不可吃草藥吃則所出骨不能如舊凡跌損腸肚中汙血且服散血藥如四物湯之類凡損大小便不通未可便服損藥蓋損藥用酒必熱且服四物湯更看如何又服大成湯加木通如大小便尚未通又加朴硝待大小便通後卻服損藥凡傷重者未服損藥先服氣藥如勻氣散之類凡渾身無故損痛是風損當服風損藥如排風湯之類凡服損藥不可吃冷物魚牛肉極冷尤不可吃若吃牛肉痛不可治凡損藥必熱便生血氣以接骨耳凡服藥不拘在紅酒無灰酒生酒皆可凡藥三四月煉不可多合五月尤甚存散藥隨時旋丸凡收藥丸子末子並用罐子收入廚子內以火焙之凡損用火灸則醫不得服藥不效矣諸藥惟小紅丸大活血丹最貴蓋其間用乳香沒藥楓香可代乳香三之一血竭難得合大活血丹缺此亦可若有更佳合藥斷不可無乳香沒藥若無沒藥以番降真代血竭無亦用此代凡所用藥材有外道者有當土者如當歸土與川不同丸子可用土當歸土藥材末子須用外道者洗藥凡傷重者用此方煎湯洗之然後敷藥生蔥切斷一本用生薑荊芥銼土當歸上三味煎湯溫熱淋洗黑龍散貼用治跌撲傷損筋骨碎斷差爻出臼先煎蔥湯或藥汁淋洗拔伸整擦令骨相續平正後卻用生薑汁或生地黃汁和水調稀卻將熟帛或皮紙量損處大小薄攤於上貼之次以木皮約如指大片疏排令周匝將小繩三度縛之要緊三日一次再如前淋洗換藥貼裹不可去夾須護毋令搖動候骨生牢穩方去夾則復如故若被刀箭傷蟲獸傷齧成瘡穰爛肌肉不生跌磕腫痛並用薑汁和水調貼有破則留口以風流散填塗穿山甲六兩炒黃或燒存性丁香皮六兩土當歸二兩百草霜散血入半兩枇杷葉根去毛入半兩雲山枇杷根上焙碾為細末薑汁水調或研地黃汁調用大活血丹治撲損傷折骨碎筋傷疼痛浮腫腹有瘀血灌注四肢煩滿不安癰疽發背筋肉壞爛諸般風疾左癱右瘓手足頑麻婦人血風諸疾産後敗血不行流入四肢頭面浮腫血氣疼痛渾身疼痹經脈湛濁風癆發動百節痠疼並宜服之每服半丸用無灰酒磨化微煎三五沸溫服不拘時不限多少此藥將紗葛袋收掛淨處經久不壞可備急用孕婦莫服損在上食後服在下空心服傷重不拘余仿此天南星一斤薑汁浸一宿焙芍藥一斤赤白皆可骨碎補一斤焙石上生者佳黑豆一斤酒煮焙乾大栗間一斤老者去皮焙川烏一斤炮自然銅半斤火煅酸醋淬存性取半斤血竭六兩別研細辛十兩去苗葉取十兩白芷一斤木鱉半斤去殼細切麩炒取半斤川牛膝一斤去蘆酒浸焙取一斤沒藥四兩別研如無降真香為末代乳香半斤別研如無以三倍楓香代之青桑炭十斤青桑木取如臂大者去皮葉炭火煅令赤煙起用酸醋殺為炭上桑栗豆補星藥六味為末和余藥研為細末用米醋煮糯糊拌入臼搗千杵方聚衆人急下手丸下手稍緩則拆陰乾半月然後用火焙或曬一日大丸重六文濕中丸重三文濕干則以漆抹在手上取兩三丸挪漆為衣每服半丸合此藥勿令四眼見之更忌雞犬婦人見之則折矣小紅丸治踒折傷損皮破骨出手足碎斷筋肉壞爛疼痛甚至晝夜叫呼百治不止手足久損筋骨差爻舉動不得損後傷風濕支節攣縮遂成偏廢勞傷筋骨肩背疼痛四肢疲乏動用無力常服壯筋骨治經絡生氣血每服三十丸用生薑煎酒或鹽湯吞下不拘時候孕婦莫服骨碎補六兩薑製焙取六兩土當歸六兩焙取川烏六兩煨白楊皮六兩焙肉桂四兩不見火莪朮二兩焙丁香三兩乾薑二兩焙川芎三兩細辛四兩焙附子三兩半煨去皮乳香三錢別研不焙沒藥三錢別研芍藥六兩焙上補藥歸楊四味用當土者餘八味研為細末乳沒別制和醋糊為丸如緑豆大信朱為衣每服三十丸溫酒下敷用生薑自然汁煎酒或鹽湯皆可不拘時候大紅丸治撲損傷折骨碎筋斷疼痛痹冷內外俱損瘀血留滯外腫內痛肢節痛倦應諸損痛不問年深日近並宜服之常服補損堅筋固骨滋血生力神驗不可具述每服三十丸溫酒醋湯任下不拘時候孕婦莫服赤蘞一斤即何首烏焙乾川烏一斤七兩火煨坼天南星一斤焙芍藥一斤焙土當歸十兩焙骨碎補一斤薑製焙牛膝十兩酒浸焙細辛八兩去苗葉焙赤小豆二升焙自然銅四兩煅存性青桑炭五斤煅醋淬缺此一味亦可其上俱要制焙後方稱斤兩上蘞星芍藥歸補膝辛七味並用當土者同餘藥羅為末醋煮麵糊為丸如梧桐子大朱為衣每服三十丸溫酒下醋湯亦可損在上食後服在下空心服傷重不拘時服或與小紅丸互用亦可黑丸子治打撲傷損驢馬跌墜骨斷筋碎百節疼痛瘀血不散浮腫結毒一切風疾四肢疼痹筋痿力乏渾身倦怠手足緩弱行步不前婦人諸般血風勞損並宜服之每服二十丸三十丸用煨蔥酒或茶任下孕婦莫服白蘞一斤焙白芨四兩焙南星六兩焙芍藥十兩焙土當歸四兩焙骨碎補八兩焙川烏三兩焙牛膝六兩焙百草霜十兩赤小豆一斤上除星芍歸補膝豆用土産者草霜釜上取同為末醋糊為丸如梧子大每服三二十丸當歸散治打撲傷損皮肉破碎筋骨寸斷瘀壅滯結腫不散或作癰疽疼痛至甚因損後中風手足痿痹不能舉動筋骨縫縱攣縮不舒及勞役所損肩背四肢疼痛並宜服之此藥大能續筋接骨剋日取效澤蘭十兩川當歸十兩芍藥白芷川芎肉桂去粗皮各五兩川續斷十兩牛膝十兩川烏川椒去目各三兩桔硬甘草各四兩白楊皮不用亦可細辛五兩以上俱要淨稱上為極細末每服二錢熱酒調下不拘時候乳香散損傷撲跌治皮肉破綻筋骨寸斷敗血壅滯結腫爛壞疼痛至甚或勞役所損背肩四肢疼痛損後中風手足痿痹不能舉動筋骨乖縱攣縮不舒大能續筋接骨卓有奇驗常服結血止疼生力每服二錢溫湯調下不拘時候肉桂乾薑各三兩牛膝羌活各四兩白芷二兩川芎細辛薑黃各四兩骨碎補當歸各六兩芍藥草烏川烏各四兩蒼朮六兩桔梗十兩赤小豆一升乳香半斤沒藥五兩何首烏十四兩木鱉去殼麩炒六兩乳沒別研一方去木鱉加海桐皮上焙碾為末續入乳沒末和湯使調服如前鱉甲散治五癆七傷四時傷寒渾身增寒壯熱骨節煩疼嗽咳痰涎酒色傷憊四肢倦怠及治山嵐瘴瘧一切積氣心腹膨脹嘔吐泄瀉應是風疾並宜服之肉桂四兩川芎四兩白芷四兩秦艽四兩鱉甲四兩醋炙三次令赤色紫菀四兩淨洗焙乾麻黃四兩不去節羌活四兩一云獨活當歸四兩去尾乾薑四兩橘皮四兩蒼朮一斤焙天台烏藥七兩紫蘇四兩不過火桔梗三斤半焙烏藥七兩柴胡七兩川烏半隻炮上焙碾為細末每服二錢水一盞姜三片烏梅一個同煎至七分熱服傷寒加蔥白煎勞損入鹽熱酒調下小紅丸烏頭一個何首烏蒼朮蛇床子五靈脂牛膝赤小豆白膠香當歸各一兩乳香二錢上為末好酒煮糊為丸如緑豆大每服三十丸溫酒送下小黑丸白蘞白芨南星芍藥各十兩當歸五兩細辛三兩赤小豆一升百草霜六兩右為末醋糊為丸如梧子大每服三十丸溫酒下搜風丸治風損腰痛頭疼治效與黑丸子同何首烏南星骨碎補川烏各半斤土牛膝芍藥各五兩一云二兩細辛三兩當歸十兩白蘚皮上為末醋糊為丸如梧子大每服三十丸溫酒鹽湯不拘時吞下驅風丸治效同黑丸子骨碎補五兩川烏川芎各一兩草烏川當歸牛膝木鱉各二兩何首烏四兩烏金四兩即百草霜一云京墨上為末醋糊丸如梧子大每服三十丸空心鹽湯下或荊芥茶湯食後下黑虎丹治男子婦人手足麻痹川烏木鱉各一斤地龍十兩黑豆半升五靈脂二兩松墨二兩醋炒上四味為末五靈脂醋研碎煮麵糊為丸龍眼大每服一丸或二丸細嚼酒下薄荷茶亦可不拘時首烏丸治風損寬筋何首烏十斤黑豆半升同蒸熟牽牛子十兩炒牛膝薄荷各二十兩川烏二兩青木香五兩皂角二斤一斤燒存性一斤蜜炙用上為末酒糊丸如梧子大每服三十丸蔥湯或薄荷湯不拘時下勻氣散凡傷重先下此藥調氣然後服損藥茴香青皮厚朴制白芷烏藥杏仁去皮尖各半兩陳皮麥蘖前胡桔梗蒼朮粉草各一兩上為末每服二錢水一盞薑棗煎至八分空心服四物湯凡傷重腸內有瘀血者用此白芍藥川當歸熟地黃川芎上等分每服三錢水一盞半煎至七分空心熱服一方只用當歸大黃二味七氣湯半夏五兩人參肉桂甘草炙各一兩上每服三錢水一盞姜三片煎至七分食前熱服五積散治五癆七傷凡被傷頭痛傷風發寒姜煎二錢仍