front:
  text: 序此方乃唐會昌間有一頭陀結草菴於宜春之鐘村貌甚古年百四五十歲買數畝墾畲種粟以自給村氓有彭叟者常常往來其廬顏情甚捻或助之耕一日彭之子升木伐條誤墜於地折頸挫肱呻吟不絶彭訴於道人道人請視之命買數品藥親制以餌俄而痛定數日已如平時始知道人能醫求者益衆道人亦厭之乃取方授彭使自制以應求者且誓之以無苟取毋輕售毋傳非人由是言治損者宗彭氏彭叟之初識道人三十許今老矣然風采無異前時問其姓名曰藺道者問其氏曰長安人也始道人閉門不通人事人亦少至惟一鄧先生每春晴秋爽攜稚過之必載酒肴從焉道人懸一椰瓢壁間鄧至則取瓢更酌彭或遇之亦酌二人皆談笑竟晷醉則高歌其詞曰經世學經世學成無用著山中樂山中樂土堪耕鑿癭瓢有酒同君酌醉臥草廬誰喚覺松陰忽聽雙鳴鶴起來日出穿林薄彭踳朴不知所言為何惟熟聽其歌亦得其腔每歸對人歌之人亦不省居久鄧先生不至彭問道人道人云已仙去彭卒不悟後江西觀察使行部至袁州聞彭所歌異之詰其詞得道人姓氏遂遣人同彭叟至其廬邀之至則行矣惟瓢存焉廉大以為恨謂彭傳其治損諸方因易其村曰鞏道人有書數篇所授者特其最後一卷云
